name: Deploy to Vercel (production)

# Auto-deploys to Vercel on every push to main.
# Requires one GitHub Actions secret: VERCEL_TOKEN
#   (create at https://vercel.com/account/tokens, then:
#    gh secret set VERCEL_TOKEN   — or add it in repo Settings → Secrets → Actions)
# The Vercel org/project IDs below are identifiers, not secrets.
# Firebase VITE_* env vars come from the Vercel project (vercel pull), so they
# don't need to be duplicated here.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_rsCnGNtiUuVELMaFswMYfGhn
  VERCEL_PROJECT_ID: prj_ttVtyTSlQJW0az9Mh2sqQIXPvBQC

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings & env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
